name: 🚀 Deploy NestJS Blog Backend API to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy y build en el VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_KEY }}
        command_timeout: "20m" # Evita que GitHub aborte antes de terminar el build
        script: |
          set -e
          cd /var/www/backend-conectamente/Loza-blog-backend-conectamente

          # 1. Traer el ultimo codigo mergeado a main (siempre igual a origin/main)
          git fetch origin main
          git reset --hard origin/main

          # 2. Inyectar variables de entorno de produccion
          printf "%s" "${{ secrets.ENV_FILE }}" > .env

          # 3. Instalar y compilar el proyecto TypeScript
          npm install
          npm run build

          # 4. Reinicio seguro de PM2 sin colgar la consola de GitHub
          # Si el proceso ya existe lo reinicia, si no, lo inicia de cero
          if pm2 describe conectamente-api > /dev/null 2>&1; then
            pm2 restart conectamente-api --update-env
          else
            pm2 start dist/main.js --name "conectamente-api"
          fi

          pm2 save

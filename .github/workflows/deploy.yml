name: 🚀 Deploy Loza Backend

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Copy files to VPS
    uses: appleboy/scp-action@v0.1.7
    with:
      host: ${{ secrets.VPS_HOST }}
      username: root
      key: ${{ secrets.VPS_KEY }}
      source: "."
      target: "/opt/Loza-blog-backend-conectamente"

  - name: Deploy application
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.VPS_HOST }}
      username: root
      key: ${{ secrets.VPS_KEY }}
      script: |
        set -e

        cd /opt/Loza-blog-backend-conectamente

        printf "%s" "${{ secrets.ENV_FILE }}" > .env

        npm install

        npm run build

        pm2 stop loza-blog-backend-conectamente || true

        pm2 delete loza-blog-backend-conectamente || true

        pm2 start dist/main.js --name loza-blog-backend-conectamente

        pm2 save

